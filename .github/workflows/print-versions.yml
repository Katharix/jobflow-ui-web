name: Print Versions

on:
  workflow_dispatch:
  workflow_run:
    types: [requested, in_progress, completed]
    workflows:
      - CI
      - Deploy Angular To Production From Release Tag

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: read

jobs:
  print-version:
    name: Print App Versions
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.name == 'CI' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master' && github.event.workflow_run.conclusion == 'success') || (github.event.workflow_run.name == 'Deploy Angular To Production From Release Tag' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    environment: Version Table

    steps:
      - uses: actions/checkout@v4

      - name: Build deployment table
        id: build-table
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const toCentralUs = (iso) => {
              if (!iso) return 'n/a';
              return new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/Chicago',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
              }).format(new Date(iso)).replace(',', '');
            };

            // Find open deploy-review issue for linking
            let deployReviewUrl = null;
            let deployReviewRunId = null;
            try {
              const reviewIssues = await github.rest.issues.listForRepo({
                owner, repo,
                labels: 'deploy-review',
                state: 'open',
                per_page: 1
              });
              if (reviewIssues.data.length > 0) {
                deployReviewUrl = reviewIssues.data[0].html_url;
                const match = reviewIssues.data[0].body?.match(/<!-- run_id:(\d+) -->/);
                if (match) deployReviewRunId = parseInt(match[1]);
              }
            } catch (e) {
              // No deploy-review issues found
            }

            const formatEnvCell = (run) => {
              if (!run) return 'n/a';

              const when = run.conclusion === 'success'
                ? (run.updated_at || run.run_started_at || run.created_at)
                : (run.run_started_at || run.created_at || run.updated_at);

              let icon = '';
              let state = '';
              if (run.conclusion === 'success') {
                icon = '🟢';
                state = 'Deployed';
              } else if (run.status === 'waiting') {
                icon = '🟡';
                state = 'Approve Deploy';
              } else if (run.conclusion === 'cancelled') {
                icon = '⚪';
                state = 'Cancelled';
              } else if (run.conclusion === 'failure') {
                icon = '🔴';
                state = 'Failed';
              } else if (['in_progress', 'queued', 'pending', 'requested'].includes(run.status)) {
                icon = '🔵';
                state = 'In Progress';
              } else {
                icon = '⚪';
                state = run.conclusion || run.status || 'Unknown';
              }

              let url = run.html_url;
              if (run.status === 'waiting' && deployReviewUrl
                  && (!deployReviewRunId || deployReviewRunId === run.id)) {
                url = deployReviewUrl;
              }

              return `${icon}<br/>[${state}](${url})<br/>${toCentralUs(when)}`;
            };

            const extractTicket = (text) => {
              if (!text) return 'n/a';
              const match = text.match(/\b(AB#\d+)\b/i);
              return match ? match[1].toUpperCase() : 'n/a';
            };

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100
            });

            const findWorkflow = (name) => workflows.find((w) => w.path && w.path.endsWith(name));
            const stagingWf = findWorkflow('firebase-deploy.yml');
            const prodWf = findWorkflow('firebase-prod-from-tag.yml');

            const recentRunsFor = async (workflowId) => {
              if (!workflowId) return null;
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 50
              });
              return response.data.workflow_runs || [];
            };

            const isPendingApproval = (run) => run
              && ['waiting', 'queued', 'in_progress', 'pending', 'requested'].includes(run.status);

            const pickStagingRun = (runs, sha) => {
              if (!runs || runs.length === 0) return null;
              return runs.find((run) => sha && run.head_sha === sha) || runs[0];
            };

            const pickProdRun = (runs, sha) => {
              if (!runs || runs.length === 0) return null;

              return (
                runs.find((run) => sha && run.head_sha === sha && isPendingApproval(run)) ||
                runs.find((run) => sha && run.head_sha === sha) ||
                runs.find((run) => isPendingApproval(run)) ||
                runs[0]
              );
            };

            const stagingRuns = await recentRunsFor(stagingWf && stagingWf.id);
            const prodRuns = await recentRunsFor(prodWf && prodWf.id);

            const sourceSha =
              context.payload.workflow_run?.head_sha ||
              context.sha ||
              stagingRuns[0]?.head_sha ||
              prodRuns[0]?.head_sha;

            const stagingRun = pickStagingRun(stagingRuns, sourceSha);
            const prodRun = pickProdRun(prodRuns, sourceSha);

            let prCell = 'n/a';
            let ticketCell = 'n/a';
            if (sourceSha) {
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sourceSha
              });

              if (prs.data.length > 0) {
                const pr = prs.data[0];
                prCell = `[#${pr.number}](${pr.html_url})<br/>${pr.title}`;
                ticketCell = extractTicket(pr.title);
              }
            }

            const buildTime = toCentralUs(
              stagingRun?.run_started_at ||
              stagingRun?.created_at ||
              prodRun?.run_started_at ||
              prodRun?.created_at
            );

            const versionCell = sourceSha
              ? `[${sourceSha.slice(0, 8)}](https://github.com/${owner}/${repo}/commit/${sourceSha})`
              : 'n/a';

            const table = [
              '# Version Table',
              '',
              '_All times are in Central US Time_',
              '',
              '<details open>',
              '<summary>ui</summary>',
              '',
              '### ui',
              '',
              '| Version | PR | Ticket | Build Time | staging | production |',
              '| --- | --- | --- | --- | --- | --- |',
              `| ${versionCell} | ${prCell} | ${ticketCell} | ${buildTime} | ${formatEnvCell(stagingRun)} | ${formatEnvCell(prodRun)} |`,
              '',
              '</details>'
            ].join('\n');

            core.setOutput('table', table);

      - name: Print Info
        run: printf '%s\n' "${{ steps.build-table.outputs.table }}" >> "$GITHUB_STEP_SUMMARY"
