name: Print Versions

on:
  workflow_dispatch:
  workflow_run:
    types: [completed]
    workflows:
      - CI

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  print-version:
    name: Print App Versions
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: Version Table

    steps:
      - uses: actions/checkout@v4

      - name: Build deployment table
        id: build-table
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const toCentralUs = (iso) => {
              if (!iso) return 'n/a';
              return new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/Chicago',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
              }).format(new Date(iso)).replace(',', '');
            };

            const formatEnvCell = (run) => {
              if (!run) return 'n/a';

              const when = run.conclusion === 'success'
                ? (run.updated_at || run.run_started_at || run.created_at)
                : (run.run_started_at || run.created_at || run.updated_at);

              const state = run.conclusion === 'success'
                ? 'Deployed'
                : (run.status === 'waiting' ? 'Awaiting approval' : (run.conclusion || run.status || 'Unknown'));

              return `[${state}](${run.html_url})<br/>${toCentralUs(when)}`;
            };

            const formatApprovalCell = (run) => {
              if (!run) return 'n/a';

              if (run.status === 'waiting') {
                return `[Approve Deploy](${run.html_url})`;
              }

              if (run.conclusion === 'success') {
                return `Approved`;
              }

              if (run.status === 'in_progress' || run.status === 'queued' || run.status === 'pending') {
                return `[Pending Approval](${run.html_url})`;
              }

              return `[${run.conclusion || run.status || 'Unknown'}](${run.html_url})`;
            };

            const extractTicket = (text) => {
              if (!text) return 'n/a';
              const match = text.match(/\b(AB#\d+)\b/i);
              return match ? match[1].toUpperCase() : 'n/a';
            };

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100
            });

            const findWorkflow = (name) => workflows.find((w) => w.path && w.path.endsWith(name));
            const stagingWf = findWorkflow('firebase-deploy.yml');
            const prodWf = findWorkflow('firebase-prod-from-tag.yml');

            const latestRunFor = async (workflowId) => {
              if (!workflowId) return null;
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 10
              });
              return response.data.workflow_runs && response.data.workflow_runs.length > 0
                ? response.data.workflow_runs[0]
                : null;
            };

            const stagingRun = await latestRunFor(stagingWf && stagingWf.id);
            const prodRun = await latestRunFor(prodWf && prodWf.id);

            const sourceSha =
              context.payload.workflow_run?.head_sha ||
              context.sha ||
              stagingRun?.head_sha ||
              prodRun?.head_sha;

            let prCell = 'n/a';
            let ticketCell = 'n/a';
            if (sourceSha) {
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sourceSha
              });

              if (prs.data.length > 0) {
                const pr = prs.data[0];
                prCell = `[#${pr.number}](${pr.html_url})<br/>${pr.title}`;
                ticketCell = extractTicket(pr.title);
              }
            }

            const buildTime = toCentralUs(
              stagingRun?.run_started_at ||
              stagingRun?.created_at ||
              prodRun?.run_started_at ||
              prodRun?.created_at
            );

            const versionCell = sourceSha
              ? `[${sourceSha.slice(0, 8)}](https://github.com/${owner}/${repo}/commit/${sourceSha})`
              : 'n/a';

            const table = [
              '# Version Table',
              '',
              '_All times are in Central US Time_',
              '',
              '<details open>',
              '<summary>ui</summary>',
              '',
              '### ui',
              '',
              '| Version | PR | Ticket | Build Time | staging | approve deploy | production |',
              '| --- | --- | --- | --- | --- | --- | --- |',
              `| ${versionCell} | ${prCell} | ${ticketCell} | ${buildTime} | ${formatEnvCell(stagingRun)} | ${formatApprovalCell(prodRun)} | ${formatEnvCell(prodRun)} |`,
              '',
              '</details>'
            ].join('\n');

            core.setOutput('table', table);

      - name: Print Info
        run: printf '%s\n' "${{ steps.build-table.outputs.table }}" >> "$GITHUB_STEP_SUMMARY"
