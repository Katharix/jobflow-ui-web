name: Print Versions

on:
  workflow_dispatch:
  workflow_run:
    types: [completed]
    workflows:
      - CI

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  print-version:
    name: Print App Versions
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: Version Table

    steps:
      - uses: actions/checkout@v4

      - name: Print Info
        env:
          DEV_VERSION: ${{ vars.UI_DEV_VERSION }}
          STAGING_VERSION: ${{ vars.UI_STAGING_VERSION }}
          PROD_VERSION: ${{ vars.UI_PRODUCTION_VERSION }}
        run: |
          [ -n "$DEV_VERSION" ] || DEV_VERSION="n/a"
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## UI Environment Versions"
            echo
            echo "| Environment | Deployed version |"
            echo "| --- | --- |"
            echo "| Development | $DEV_VERSION |"
            echo "| Staging | $STAGING_VERSION |"
            echo "| Production | $PROD_VERSION |"
          } >> "$GITHUB_STEP_SUMMARY"
