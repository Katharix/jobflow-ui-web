name: Handle Deploy Approval

on:
  issue_comment:
    types: [created]

jobs:
  process-approval:
    name: Process Deploy Approval
    if: |
      github.event.issue.state == 'open' &&
      contains(join(github.event.issue.labels.*.name, ','), 'deploy-review')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_APPROVAL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const comment = context.payload.comment.body.trim().toLowerCase();
            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;

            const approveKeywords = ['approve', 'approved', 'lgtm', 'ship it'];
            const denyKeywords = ['deny', 'denied', 'needs changes'];

            const isApproval = approveKeywords.some(w => comment.includes(w));
            const isDenial = denyKeywords.some(w => comment.includes(w));

            if (!isApproval && !isDenial) {
              core.info('Comment does not contain approval or denial keywords. Skipping.');
              return;
            }

            if (isApproval) {
              // Find the most recent release-* tag
              const tags = await github.rest.repos.listTags({
                owner, repo,
                per_page: 100
              });

              const releaseTag = tags.data.find(t => t.name.startsWith('release-'));
              if (!releaseTag) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issueNumber,
                  body: '⚠️ No `release-*` tag found in this repo. Create a release tag before approving.'
                });
                return;
              }

              // Find the prod workflow
              const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
              const prodWorkflow = workflows.data.workflows.find(w =>
                w.path === '.github/workflows/firebase-prod-from-tag.yml'
              );

              if (!prodWorkflow) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issueNumber,
                  body: '⚠️ Could not find the production deployment workflow.'
                });
                return;
              }

              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: prodWorkflow.id,
                  ref: 'main',
                  inputs: { release_tag: releaseTag.name }
                });
              } catch (e) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issueNumber,
                  body: `⚠️ Failed to trigger production deployment: ${e.message}`
                });
                return;
              }

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body: `✅ Deployment **approved** by @${commenter}\n\n🚀 Deploying tag \`${releaseTag.name}\` to production...`
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body: `❌ Deployment **rejected** by @${commenter}`
              });
            }

            await github.rest.issues.update({
              owner, repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: isApproval ? 'completed' : 'not_planned'
            });
