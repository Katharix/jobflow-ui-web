name: Deploy Angular To Production From Release Tag

on:
  push:
    tags:
      - release-*

permissions:
  contents: read
  actions: write

jobs:
  version-overview:
    name: Version Overview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish version table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          DEV_VERSION: ${{ vars.UI_DEV_VERSION }}
          STAGING_VERSION: ${{ vars.UI_STAGING_VERSION }}
          PROD_VERSION: ${{ vars.UI_PRODUCTION_VERSION }}
        run: |
          [ -n "$DEV_VERSION" ] || DEV_VERSION="n/a"
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## UI Release Versions"
            echo
            echo "Target release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Current deployed version | Planned action |"
            echo "| --- | --- | --- |"
            echo "| Development | $DEV_VERSION | No change in this workflow |"
            echo "| Staging | $STAGING_VERSION | Already deployed before tagging |"
            echo "| Production | $PROD_VERSION | Deploy $RELEASE_TAG after approval |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Deploy to Production (${{ github.ref_name }})
    needs: version-overview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    environment:
      name: Production

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build:prod

      - name: Deploy to Firebase Hosting (prod)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Resolve production deployed version
        id: prod-version
        run: |
          echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Record production deployed version
        uses: actions/github-script@v7
        env:
          DEPLOYED_VERSION: ${{ steps.prod-version.outputs.value }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const name = 'UI_PRODUCTION_VERSION';
            const value = process.env.DEPLOYED_VERSION;

            try {
              await github.rest.actions.getRepoVariable({ owner, repo, name });
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else {
                throw error;
              }
            }

  publish-version-table:
    name: Publish Final Version Table
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - deploy-prod
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish final deployment table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          DEV_VERSION: ${{ vars.UI_DEV_VERSION }}
          STAGING_VERSION: ${{ vars.UI_STAGING_VERSION }}
          PROD_VERSION: ${{ needs.deploy-prod.result == 'success' && steps.release-tag.outputs.value || vars.UI_PRODUCTION_VERSION }}
          PROD_STATUS: ${{ needs.deploy-prod.result }}
        run: |
          [ -n "$DEV_VERSION" ] || DEV_VERSION="n/a"
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## Final UI Version Table"
            echo
            echo "Release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Deployed version | Job status |"
            echo "| --- | --- | --- |"
            echo "| Development | $DEV_VERSION | unchanged |"
            echo "| Staging | $STAGING_VERSION | unchanged in this workflow |"
            echo "| Production | $PROD_VERSION | $PROD_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
