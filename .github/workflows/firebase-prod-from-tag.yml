name: Deploy Angular To Production From Release Tag

on:
  push:
    tags:
      - release-*

permissions:
  contents: read

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build:prod

      - name: Deploy to Firebase Hosting (prod)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
