name: Deploy Angular To Production From Release Tag

on:
  push:
    tags:
      - release-*

permissions:
  contents: read

jobs:
  prod-approval:
    name: Manual Approval For Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Validate PROD_APPROVERS variable
        env:
          PROD_APPROVERS: ${{ vars.PROD_APPROVERS }}
        run: |
          if [ -z "$PROD_APPROVERS" ]; then
            echo "Set repository variable PROD_APPROVERS to a comma-separated list of GitHub usernames allowed to approve production deploys."
            exit 1
          fi

      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1
          issue-title: "Approve UI production deploy"
          issue-body: "Release tag is ready. Approve this production deployment by commenting 'approve'."
          exclude-workflow-initiator-as-approver: false

  deploy-prod:
    needs: prod-approval
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build:prod

      - name: Deploy to Firebase Hosting (prod)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
