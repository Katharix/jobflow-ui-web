name: Deploy Angular to Firebase Hosting

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  deploy-staging:
    name: Deploy to Staging (${{ github.event.workflow_run.head_sha }})
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment:
      name: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build:staging

      - name: Deploy to Firebase Hosting (staging)
        uses: w9jds/firebase-action@46a04d83eb19539c893cc86fce57ecbd82ba3111 # v15.14.0
        with:
          args: deploy --only hosting --project staging
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Resolve staging source version
        id: staging-version
        run: |
          echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Record staging deployed version
        uses: actions/github-script@v7
        env:
          DEPLOYED_VERSION: ${{ steps.staging-version.outputs.value }}
        with:
          github-token: ${{ secrets.ACTIONS_VARIABLES_TOKEN != '' && secrets.ACTIONS_VARIABLES_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const name = 'UI_STAGING_VERSION';
            const value = process.env.DEPLOYED_VERSION;

            try {
              await github.rest.actions.getRepoVariable({ owner, repo, name });
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else if (error.status === 403) {
                core.warning('Skipping repository variable update: token lacks actions_variables permission. Configure secret ACTIONS_VARIABLES_TOKEN with repository Variables read/write access.');
              } else {
                throw error;
              }
            }

  create-release-tag:
    name: Create Release Tag
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    needs: deploy-staging
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="release-$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "UI release $tag"
          git push origin "$tag"

      - name: Tag summary
        run: echo "Release tag created and pushed. Production deploy is handled by tag-triggered workflow."
