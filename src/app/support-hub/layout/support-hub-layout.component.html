<div class="sh-layout" [class.sh-layout--collapsed]="sidebarCollapsed">
  <aside class="sh-layout__sidebar">
    <div class="sh-layout__brand">
      <img src="/assets/public/images/Asset 1.png" alt="JobFlow" />
      <div class="sh-layout__brand-label">Support Hub</div>
    </div>

    <nav class="sh-layout__nav">
      @for (group of navGroups; track group.heading) {
        <div class="sh-nav-section">{{ group.heading }}</div>
        @for (item of group.items; track item.route) {
          <a
            class="sh-nav-item"
            [routerLink]="item.route"
            routerLinkActive="active"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="sh-layout__user">
      <div class="sh-user-avatar">{{ userInitials }}</div>
      <div class="sh-user-info">
        <div class="sh-user-name" (dblclick)="copyToken()">{{ userDisplayName }}</div>
        <div class="sh-user-role">{{ userEmail }}</div>
        @if (tokenCopiedMessage) {
          <div style="font-size: 0.6875rem; color: #86efac; margin-top: 0.25rem;">{{ tokenCopiedMessage }}</div>
        }
      </div>
      <button class="sh-logout-btn" (click)="logout()">
        <i class="ti ti-logout"></i>
      </button>
    </div>
  </aside>

  <header class="sh-layout__topbar">
    <button class="sh-layout__toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
      <i class="ti ti-menu-2"></i>
    </button>
    <div class="sh-layout__topbar-title">Support Hub</div>
    <div class="sh-layout__topbar-actions">
      <span style="font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; padding: 0.3rem 0.7rem; border-radius: 999px; background: var(--jf-primary-soft); color: var(--jf-primary);">Internal</span>
    </div>
  </header>

  <main class="sh-layout__content">
    <router-outlet></router-outlet>
  </main>
</div>
