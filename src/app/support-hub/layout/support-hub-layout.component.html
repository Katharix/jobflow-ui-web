<div class="support-hub" [class.support-hub--collapsed]="sidebarCollapsed">
  <aside class="support-hub__sidebar">
    <div class="support-hub__brand">
      <img src="/assets/public/images/Asset 1.png" alt="JobFlow" />
      <div class="support-hub__brand-text">
        <span class="support-hub__brand-title">Support Hub</span>
        <span class="support-hub__brand-subtitle">Katharix</span>
      </div>
    </div>

    <nav class="support-hub__nav">
      @for (group of navGroups; track group.heading) {
        <span class="support-hub__nav-heading">{{ group.heading }}</span>
        @for (item of group.items; track item.route) {
          <a
            class="support-hub__nav-link"
            [routerLink]="item.route"
            routerLinkActive="is-active"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="support-hub__sidebar-footer">
      <div class="support-hub__user">
        <div class="support-hub__avatar">{{ userInitials }}</div>
        <div class="support-hub__user-info">
          <span class="support-hub__user-name" (dblclick)="copyToken()">{{ userDisplayName }}</span>
          <span class="support-hub__user-email">{{ userEmail }}</span>
        </div>
      </div>
      @if (tokenCopiedMessage) {
        <div class="support-hub__token-toast">{{ tokenCopiedMessage }}</div>
      }
      <button class="support-hub__logout" (click)="logout()">
        <i class="ti ti-logout"></i>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <div class="support-hub__main">
    <header class="support-hub__topbar">
      <button class="support-hub__toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i class="ti ti-menu-2"></i>
      </button>
      <div class="support-hub__topbar-right">
        <span class="support-hub__env-badge">Internal</span>
      </div>
    </header>

    <div class="support-hub__content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
