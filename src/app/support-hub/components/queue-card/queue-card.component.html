<article class="qc-card" [attr.aria-label]="customer.name + ' — waiting ' + customer.waitMinutes + ' minutes'">
  <div class="qc-avatar" aria-hidden="true">{{ customer.avatarInitials || customer.name.charAt(0) }}</div>
  
  <div class="qc-body">
    <span class="qc-name">{{ customer.name }}</span>
    @if (!compact) {
      <span class="qc-sub">{{ customer.organizationName }}</span>
    }
  </div>

  <div class="qc-meta">
    <div class="qc-wait">
      <i class="ti ti-clock" aria-hidden="true"></i> {{ customer.waitMinutes }}m
    </div>
    <button class="qc-pickup-btn" (click)="onPickUp()" [attr.aria-label]="'Pick up ' + customer.name">
      <i class="ti ti-phone-call" aria-hidden="true"></i> Pick Up
    </button>
    @if (showRemove) {
      <button class="qc-pickup-btn qc-pickup-btn--danger" (click)="onRemove()" title="Remove from queue" aria-label="Remove from queue">
        <i class="ti ti-x" aria-hidden="true"></i> Remove
      </button>
    }
  </div>
</article>
