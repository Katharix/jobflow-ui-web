<app-page-header
  title="Organizations"
  subtitle="Search, review, and assist every organization in JobFlow."
></app-page-header>

<section class="support-orgs">
  <div class="support-orgs__summary">
    <div>
      <h5 class="support-mb-1">Organization console</h5>
      <p class="support-muted">Open an org to review billing, onboarding, and support history.</p>
    </div>
    <div class="support-orgs__meta">
      <span class="support-orgs__count">{{ organizations.length }} total</span>
    </div>
  </div>

  <div class="support-orgs__grid">
    @if (isLoading) {
      <div class="support-orgs__empty">
        <p class="support-muted support-mb-0">Loading organizations...</p>
      </div>
    } @else if (error) {
      <div class="support-orgs__empty">
        <p-message severity="error" [text]="error"></p-message>
      </div>
    } @else {
      <app-jobflow-grid
        [data]="organizations"
        [columns]="columns"
        [allowPaging]="true"
        [allowSorting]="true"
        [allowFiltering]="false"
        [showSearchBar]="true"
        [pageSettings]="pageSettings"
        [height]="520"
      ></app-jobflow-grid>
    }
  </div>
</section>
