<app-page-header
  title="Organizations"
  subtitle="Search, review, and assist every organization in JobFlow."
></app-page-header>

<section class="sh-orgs">
  <div class="sh-toolbar">
    <div>
      <h5 class="support-mb-1">Organization console</h5>
      <p class="support-muted">Open an org to review billing, onboarding, and support history.</p>
    </div>
    <span class="sh-toolbar__count">{{ organizations.length }} total</span>
  </div>

  <div class="sh-data">
    @if (isLoading) {
      <div class="sh-empty">
        <p>Loading organizations...</p>
      </div>
    } @else if (error) {
      <div class="sh-empty">
        <p-message severity="error" [text]="error"></p-message>
      </div>
    } @else {
      <app-jobflow-grid
        [data]="organizations"
        [columns]="columns"
        [allowPaging]="true"
        [allowSorting]="true"
        [allowFiltering]="false"
        [showSearchBar]="true"
        [pageSettings]="pageSettings"
        [height]="520"
      ></app-jobflow-grid>
    }
  </div>
</section>
