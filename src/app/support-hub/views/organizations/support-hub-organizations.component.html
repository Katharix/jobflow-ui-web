<div class="page-container">
  <div class="page-header">
    <div class="page-header__title-group">
      <h1 class="page-header__title">Organizations</h1>
      <p class="page-header__subtitle">Manage client organizations</p>
    </div>
    <div class="page-header__actions">
      <span class="sh-toolbar__count">{{ organizations.length }} total</span>
    </div>
  </div>

  <div class="content-card content-card--no-pad">
    @if (isLoading) {
      <div class="empty-state">
        <p>Loading organizations...</p>
      </div>
    } @else if (error) {
      <div class="empty-state">
        <p-message severity="error" [text]="error"></p-message>
      </div>
    } @else {
      @if (organizations.length === 0) {
        <div class="empty-state">
          <h4>No organizations</h4>
          <p>Add your first organization to get started.</p>
        </div>
      } @else {
        <app-jobflow-grid
          [data]="organizations"
          [columns]="columns"
          [allowPaging]="true"
          [allowSorting]="true"
          [allowFiltering]="false"
          [showSearchBar]="true"
          [pageSettings]="pageSettings"
          [height]="520"
        ></app-jobflow-grid>
      }
    }
  </div>
</div>
