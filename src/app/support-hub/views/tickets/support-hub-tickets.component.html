<app-page-header
  title="Support Tickets"
  subtitle="Track and triage incoming requests across all organizations."
></app-page-header>

<section class="support-list">
  <div class="support-list__header">
    <div>
      <h5 class="support-mb-1">Priority queue</h5>
      <p class="support-muted">Escalate urgent tickets or assign to a pod.</p>
    </div>
    <button
      pButton
      type="button"
      label="Seed demo data"
      class="p-button-outlined p-button-secondary"
      (click)="seedDemo()"
    ></button>
  </div>

  <div class="support-list__composer">
    <div>
      <label class="form-label">Organization</label>
      <div class="support-org-select">
        <p-dropdown
          [options]="organizationOptions"
          optionLabel="label"
          optionValue="value"
          [(ngModel)]="selectedOrganizationId"
          placeholder="Select organization"
          styleClass="support-w-100"
        ></p-dropdown>
        <button
          pButton
          type="button"
          label="Find"
          class="p-button-outlined p-button-secondary"
          (click)="openOrgModal()"
        ></button>
      </div>
    </div>
    <div>
      <label class="form-label">Title</label>
      <input pInputText class="support-w-100" [(ngModel)]="newTitle" placeholder="Ticket title" />
    </div>
    <div>
      <label class="form-label">Summary</label>
      <input pInputText class="support-w-100" [(ngModel)]="newSummary" placeholder="Short summary" />
    </div>
    <div>
      <label class="form-label">Priority</label>
      <p-dropdown
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="newStatus"
        styleClass="support-w-100"
      ></p-dropdown>
    </div>
    <button
      pButton
      type="button"
      label="Create ticket"
      class="p-button-primary"
      (click)="createTicket()"
    ></button>
  </div>

  @if (actionMessage) {
    <p-message severity="success" [text]="actionMessage"></p-message>
  }

  <ng-template #statusTemplate let-ticket>
    <span [ngClass]="getTicketStatusClass(ticket.status)">{{ ticket.status }}</span>
  </ng-template>

  <ng-template #actionsTemplate let-ticket>
    <button
      pButton
      type="button"
      label="Copy ID"
      class="p-button-outlined p-button-secondary p-button-sm"
      (click)="copyTicketId(ticket)"
    ></button>
  </ng-template>

  <div class="support-list__grid">
    @if (isLoading) {
      <div class="support-list__empty">
        <p class="support-muted support-mb-0">Loading tickets...</p>
      </div>
    } @else if (error) {
      <div class="support-list__empty">
        <p-message severity="error" [text]="error"></p-message>
      </div>
    } @else {
      <app-jobflow-grid
        [data]="tickets"
        [columns]="columns"
        [allowPaging]="true"
        [allowSorting]="true"
        [allowFiltering]="false"
        [showSearchBar]="true"
        [pageSettings]="pageSettings"
        [height]="520"
      ></app-jobflow-grid>
    }
  </div>
</section>

@if (isOrgModalOpen) {
  <div class="support-modal">
    <div class="support-modal__backdrop" (click)="closeOrgModal()"></div>
    <div class="support-modal__panel">
      <div class="support-modal__header">
        <h5>Select organization</h5>
        <button
          pButton
          type="button"
          label="Close"
          class="p-button-text"
          (click)="closeOrgModal()"
        ></button>
      </div>
      <input
        pInputText
        class="support-w-100"
        placeholder="Search organizations"
        [(ngModel)]="orgSearchTerm"
      />
      <div class="support-modal__list">
        @for (org of filteredOrganizations; track org.id) {
          <button class="support-modal__item" type="button" (click)="selectOrganization(org)">
            <span>{{ org.organizationName }}</span>
          </button>
        }
      </div>
    </div>
  </div>
}
