<app-page-header
  title="Support Hub Settings"
  subtitle="Configure policies, escalation paths, and security defaults."
></app-page-header>

<section class="sh-settings">
  <div class="sh-settings__card">
    <h5>Access policies</h5>
    <p>Define role requirements, MFA readiness, and device trust checks.</p>
    <button pButton type="button" class="p-button-outlined p-button-secondary">Manage policies</button>
  </div>

  <div class="sh-settings__card">
    <h5>Escalation routing</h5>
    <p>Route urgent tickets to senior staff or on-call rotations.</p>
    <button pButton type="button" class="p-button-outlined p-button-secondary">Configure routing</button>
  </div>

  <div class="sh-settings__card">
    <h5>Audit logs</h5>
    <p>Review access, screen-share, and data export history.</p>
    <button pButton type="button" class="p-button-outlined p-button-secondary">View logs</button>
  </div>
</section>
