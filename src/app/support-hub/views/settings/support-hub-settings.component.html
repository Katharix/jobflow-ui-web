<app-page-header
  title="Support Hub Settings"
  subtitle="Configure policies, escalation paths, and security defaults."
></app-page-header>

<section class="support-settings">
  <div class="support-settings__card">
    <h5>Access policies</h5>
    <p class="support-muted">Define role requirements, MFA readiness, and device trust checks.</p>
    <button pButton type="button" label="Manage policies" class="p-button-outlined p-button-secondary"></button>
  </div>

  <div class="support-settings__card">
    <h5>Escalation routing</h5>
    <p class="support-muted">Route urgent tickets to senior staff or on-call rotations.</p>
    <button pButton type="button" label="Configure routing" class="p-button-outlined p-button-secondary"></button>
  </div>

  <div class="support-settings__card">
    <h5>Audit logs</h5>
    <p class="support-muted">Review access, screen-share, and data export history.</p>
    <button pButton type="button" label="View logs" class="p-button-outlined p-button-secondary"></button>
  </div>
</section>
