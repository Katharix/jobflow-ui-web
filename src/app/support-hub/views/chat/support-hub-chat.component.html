<div class="cc-shell">
  <!-- Chat header -->
  <header class="cc-header">
    <div class="cc-header__brand">
      <img src="/assets/public/images/Asset 1.png" alt="JobFlow" class="cc-header__logo">
      <span class="cc-header__label">Support Hub</span>
    </div>
    
    <div style="display:flex; align-items:center; gap: 1rem;">
      <div class="cc-header__status" [class.is-online]="agentOnline" [attr.aria-label]="agentOnline ? 'Agent online' : 'Agent offline'">
        <span class="cc-online-dot"></span>
        <span class="cc-status-text">{{ agentOnline ? 'Online' : 'Offline' }}</span>
      </div>
      
      <button
        class="cust-chat__icon-btn"
        (click)="onToggleSound()"
        [attr.aria-pressed]="soundEnabled"
        [attr.aria-label]="soundEnabled ? 'Mute message notifications' : 'Unmute message notifications'"
        title="{{ soundEnabled ? 'Mute notifications' : 'Unmute notifications' }}"
        style="border:none; background:transparent; cursor:pointer; font-size:1.2rem; color:var(--jf-text-muted);"
      >
        <i [class]="soundEnabled ? 'ti ti-bell' : 'ti ti-bell-off'" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <!-- Chat window -->
  <main class="cc-body">
    <app-chat-window
      [messages]="messages"
      [isTyping]="isTyping"
      [soundEnabled]="soundEnabled"
      [canUpload]="true"
      perspective="customer"
      [sessionEnded]="sessionEnded"
      (sendMessage)="onSendMessage($event)"
      (fileSelected)="onFileSelected($event)"
      (soundToggled)="onToggleSound()"
    ></app-chat-window>
  </main>
</div>
