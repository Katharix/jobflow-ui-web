<aside class="cs-shell" aria-label="Customer information">
  @if (isLoading || !customer) {
    <!-- Skeleton state -->
    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
      <div class="cs-customer">
        <div class="cs-avatar sh-skeleton"></div>
        <div class="cs-customer-info" style="width: 100%;">
          <div class="sh-skeleton" style="width: 70%; height: 1rem;"></div>
          <div class="sh-skeleton" style="width: 40%; height: 0.75rem;"></div>
        </div>
      </div>
    </div>
  } @else {
    <!-- Customer Card -->
    <div class="cs-customer">
      <div class="cs-avatar" aria-hidden="true">{{ customer.name.charAt(0) }}</div>
      <div class="cs-customer-info">
        <div class="cs-customer-name">{{ customer.name }}</div>
        <span class="status-chip status-chip--success" style="font-size: 0.75rem; color: var(--jf-text-muted);">{{ customer.email }}</span>
      </div>
    </div>

    <!-- Info Rows -->
    <div class="cs-info-section">
      <div class="cs-section-label">Contact</div>
      
      <div class="cs-info-row">
        <span class="cs-info-icon"><i class="ti ti-building" aria-hidden="true"></i></span>
        <span class="cs-info-value">{{ customer.organizationName }}</span>
      </div>
      <div class="cs-info-row">
        <span class="cs-info-icon"><i class="ti ti-clock" aria-hidden="true"></i></span>
        <span class="cs-info-value">{{ customer.sessionStartedAt }}</span>
      </div>
      <div class="cs-info-row">
        <span class="cs-info-icon"><i class="ti ti-id" aria-hidden="true"></i></span>
        <span class="cs-info-value" style="font-family: monospace;">{{ customer.sessionId }}</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="cs-actions">
      <a class="cs-action-btn" [routerLink]="['/support-hub/tickets']" [queryParams]="{ newFor: customer.organizationName }">
        <i class="ti ti-ticket" aria-hidden="true"></i>
        <span>Create ticket</span>
      </a>
      <a class="cs-action-btn" [routerLink]="['/support-hub/people']">
        <i class="ti ti-user-search" aria-hidden="true"></i>
        <span>View profile</span>
      </a>
    </div>
  }
</aside>
