<!-- This component is used standalone when the full chat-window isn't needed.
     For full chat functionality, prefer <app-chat-window>. -->
@if (isLoading) {
  <div class="cw-messages" aria-label="Loading messages" aria-busy="true">
    @for (i of [1,2,3]; track i) {
      <div class="cw-msg" [class.cw-msg--outgoing]="i % 2 === 0" [class.cw-msg--incoming]="i % 2 !== 0">
        <div class="cw-bubble sh-skeleton" [style.height.px]="38" [style.width]="(40 + i * 8) + '%'"></div>
      </div>
    }
  </div>
} @else if (messages.length === 0) {
  <div class="cw-empty-state">
    <i class="ti ti-messages cw-empty-icon" aria-hidden="true"></i>
    <p class="cw-empty-text">No messages yet.</p>
  </div>
} @else {
  <div class="cw-messages" role="log" aria-label="Chat messages" aria-live="polite">
    @for (msg of messages; track msg.id) {
      <div class="cw-msg"
        [class.cw-msg--outgoing]="msg.perspective === 'outbound'"
        [class.cw-msg--incoming]="msg.perspective === 'inbound'">
        <div class="cw-bubble">
          @if (msg.text) { <p class="cw-bubble-text">{{ msg.text }}</p> }
        </div>
        <div class="cw-timestamp">{{ msg.sentAt }}</div>
      </div>
    }

    @if (isTyping) {
      <div class="cw-msg cw-msg--incoming" role="status" aria-label="Typing">
        <div class="cw-bubble">
          <span class="cw-typing-dots">
            <span class="cw-typing-dot"></span>
            <span class="cw-typing-dot"></span>
            <span class="cw-typing-dot"></span>
          </span>
        </div>
      </div>
    }
  </div>
}
