<div class="container">
  <div class="row align-items-center justify-content-between mb-3">
    <div class="col-12 col-md-auto mb-3 mb-md-0">
      <h1 class="h1 mb-0 text-primary fw-bold">Employees</h1>
    </div>
    <div class="col-12 col-md-auto text-md-end">
      <div class="d-flex gap-3 justify-content-start justify-content-md-end">
        <button class="btn btn-outline-primary btn-xl px-4 fw-semibold">
          Invite
          <lucide-icon class="icon-lg" name="chevron-down" (click)="onInviteClick()"></lucide-icon>
        </button>
        <button class="btn btn-primary btn-xl px-4 fw-semibold" (click)="onAddEmployeeClick()">
          Add Employee
          <lucide-icon class="icon-lg" name="chevron-down"></lucide-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <ejs-grid
        #employeeGrid
        cssClass="jobflow-grid"
        [dataSource]="employees"
        [allowPaging]="true"
        [allowSorting]="true"
        [allowFiltering]="true"
        [pageSettings]="{ pageSize: 10 }"
        [editSettings]="{
          allowEditing: true,
          allowAdding: true,
          allowDeleting: true,
          mode: 'Dialog'
        }"
        height="450px"
      >
        <e-columns>
          <e-column field="name" headerText="Name" width="180" isPrimaryKey="true" validationRules="{ required: true }"></e-column>
          <e-column field="email" headerText="Email" width="220" validationRules="{ required: true, email: true }"></e-column>
          <e-column field="role" headerText="Role" width="150"></e-column>
        </e-columns>
      </ejs-grid>
    </div>
  </div>
</div>
