<div class="container">
    <div class="row w-100 mx-0 auth-page">
      <div class="col-md-8 col-xl-6 mx-auto">
        <div class="card">
          <div class="row">
            <div class="col-md-4 pe-md-0">
              <div class="auth-side-wrapper" [ngStyle]="{ 'background-image': 'url(https://placehold.co/250x650)' }">
    
              </div>
            </div>
            <div class="col-md-8 ps-md-0">
              <div class="auth-form-wrapper px-4 py-5">
                <a routerLink="." class="nobleui-logo d-block mb-2"><img src="/assets/public/images/jobflow-01.png" alt="" class="logo-light" style="height: 40px;" /></a>
                <h5 class="text-secondary fw-normal mb-4">Create a free account.</h5>
                <form class="forms-sample" (ngSubmit)="onRegister($event)">
                  <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" placeholder="This is your email address" [(ngModel)]="email" name="email" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Password" [(ngModel)]="password" name="password" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
                  </div>
                  <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="authCheck" />
                    <label class="form-check-label" for="authCheck">Remember me</label>
                  </div>
                  <div>
                    <button type="submit" class="btn btn-primary me-2">Sign up</button>
                    <button type="button" class="btn btn-outline-primary btn-icon-text">
                      <i class="feather icon-twitter btn-icon-prepend"></i>
                      Sign up with twitter
                    </button>
                  </div>
                  <a routerLink="/auth/login" class="d-block mt-3 text-secondary">Already a user? Sign in</a>
                </form>
                
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
