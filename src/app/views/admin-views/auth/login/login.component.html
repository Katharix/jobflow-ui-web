<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-xl-5">
      <div class="p-4 rounded-3 bg-white">
        <div class="text-center mb-4">
          <a routerLink=".">
            <img src="/assets/public/images/Asset 1.png" alt="Logo" style="height: 40px;" />
          </a>
          <h5 class="text-muted fw-normal mt-3">Welcome back! Log in to your account.</h5>
        </div>

        <form #form="ngForm" (ngSubmit)="onLoggedin($event)">
          <!-- Email -->
          <div class="form-group form-floating-line mb-4">
            <input type="email"
                   class="form-control no-border"
                   id="email"
                   name="email"
                   placeholder="Email"
                   [(ngModel)]="email"
                   required
                   email
                   #emailModel="ngModel" />
            <!-- <label for="email" class="form-label">Email address</label> -->
            <div *ngIf="emailModel.invalid && emailModel.touched" class="text-danger mt-1">
              <div *ngIf="emailModel.errors?.['required']">Email is required.</div>
              <div *ngIf="emailModel.errors?.['email']">Enter a valid email address.</div>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group form-floating-line mb-4">
            <input type="password"
                   class="form-control no-border"
                   id="password"
                   name="password"
                   placeholder="Password"
                   [(ngModel)]="password"
                   required
                   minlength="6"
                   #passwordModel="ngModel" />
            <!-- <label for="password" class="form-label">Password</label> -->
            <div *ngIf="passwordModel.invalid && passwordModel.touched" class="text-danger mt-1">
              <div *ngIf="passwordModel.errors?.['required']">Password is required.</div>
              <div *ngIf="passwordModel.errors?.['minlength']">Password must be at least 6 characters.</div>
            </div>
          </div>

          <!-- Error -->
          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <!-- Remember Me -->
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="authCheck" />
            <label class="form-check-label" for="authCheck">Remember me</label>
          </div>

          <!-- Buttons -->
          <div class="d-grid gap-2">
            <button type="submit"
                    class="btn btn-primary"
                    [disabled]="form.invalid">
              Login
            </button>
            <button type="button" class="btn btn-outline-dark" (click)="loginWithGoogle()">
              <i class="feather icon-mail me-1"></i>
              Sign in with Google
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
