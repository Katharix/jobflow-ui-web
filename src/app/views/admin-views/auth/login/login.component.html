<div class="container">
    <div class="row w-100 mx-0 auth-page">
      <div class="col-md-8 col-xl-6 mx-auto">
        <div class="card">
          <div class="row">
            <div class="col-md-4 pe-md-0">
              <div class="auth-side-wrapper" [ngStyle]="{ 'background-image': 'url(https://placehold.co/250x650)' }">
    
              </div>
            </div>
            <div class="col-md-8 ps-md-0">
              <div class="auth-form-wrapper px-4 py-5">
                <a routerLink="." class="nobleui-logo d-block mb-2"><img src="/assets/public/images/jobflow-01.png" alt="" class="logo-light" style="height: 40px;" /></a>
                <h5 class="text-secondary fw-normal mb-4">Welcome back! Log in to your account.</h5>
                <form class="forms-sample">
                  <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" [(ngModel)]="email" class="form-control" placeholder="Email" name="email" required>
                  </div>
                  <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" [(ngModel)]="password" class="form-control" placeholder="Password" name="password" required>
                  </div>
                  <div *ngIf="error" class="alert alert-danger mt-3">
                    {{ error }}
                  </div>
                  <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="authCheck">
                    <label class="form-check-label" for="authCheck">
                      Remember me
                    </label>
                  </div>
                  <div>
                    <button type="submit" class="btn btn-primary me-2 mb-2 mb-md-0" (click)="onLoggedin($event)">Login</button>
                    <button type="button" class="btn btn-outline-info" (click)="loginWithGoogle()">
                      <i class="feather icon-mail me-1 btn-icon-prepend"></i>
                      Sign in with Google
                    </button>
                  </div>
                  <a routerLink="/auth/register" class="d-block mt-3 text-secondary">Not a user? Sign up</a>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
