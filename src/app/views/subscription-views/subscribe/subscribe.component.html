<div class="container">
    <div class="row w-100 mx-0 auth-page">
      <div class="col-md-10 col-xl-9 mx-auto">
        <div class="card">
          <div class="row">
            <div class="col-md-4 pe-md-0">
              <div class="auth-side-wrapper" [ngStyle]="{ 'background-image': 'url(https://placehold.co/250x650)' }">
    
              </div>
            </div>
            <div class="col-md-8 ps-md-0">
              <div class="auth-form-wrapper px-4 py-5">
                <a routerLink="." class="nobleui-logo d-block mb-2"><img src="/assets/public/images/jobflow-01.png" alt="" class="logo-light" style="height: 40px;" /></a>
                <h5 class="text-secondary fw-normal mb-4">Purchase Subscription Plan</h5>
                <form class="forms-sample" (ngSubmit)="onSubscribe($event)">
                  <!-- Company Name and Company Type on the same row -->
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Company Name</label>
                      <input type="text" class="form-control" placeholder="Company Name" [(ngModel)]="organizationName" name="organizationName" />
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Type of Company</label>
                      <select class="form-select" [(ngModel)]="selectedOrganizationTypeId" name="organizationType">
                        <option [ngValue]="null" disabled selected>Select company type</option>
                        <option *ngFor="let type of organizationTypes" [ngValue]="type.id">
                          {{ type.typeName }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control" placeholder="Email" [(ngModel)]="email" name="email" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" placeholder="Phone Number" [(ngModel)]="phoneNumber" name="phoneNumber" required />
                  </div>
                </div>
                  <!-- Business Address and Business Address 2 on separate rows -->
                  <div class="mb-3">
                    <label class="form-label">Business Address</label>
                    <input type="text" class="form-control" placeholder="Business Address" [(ngModel)]="companyAddress" name="companyAddress" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Business Address 2</label>
                    <input type="text" class="form-control" placeholder="Business Address 2" [(ngModel)]="companyAddress2" name="companyAddress2" required />
                  </div>
                
                  <!-- City on a separate row -->
                  <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" placeholder="City" [(ngModel)]="city" name="city" required />
                  </div>
                
                  <!-- State and Zip Code on the same row -->
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label">State</label>
                      <input type="text" class="form-control" placeholder="State" [(ngModel)]="state" name="state" required />
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Zip Code</label>
                      <input type="text" class="form-control" placeholder="Zip Code" [(ngModel)]="zipCode" name="zipCode" required />
                    </div>
                  </div>
                  <div>
                    <button type="submit" class="btn btn-primary me-2">Purchase</button>
                  </div>
                </form>
                
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
