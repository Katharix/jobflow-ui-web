<section class="section bg-light" id="contact">
    <div class="container">
      <div class="row justify-content-center text-center">
        <div class="col-lg-6">
          <p class="d-flex align-items-center justify-content-center mb-4">
            <span class="icon bg-primary rounded d-flex justify-content-center align-items-center">
              <i class="ti ti-address-book text-white f-18"></i>
            </span>
            <i class="ti ti-line-dashed text-dark fs-5"></i>
            <span class="badge bg-light border text-primary py-2 px-3 f-14">Contact</span>
          </p>
          <h3 class="text-dark">Get in Touch</h3>
          <p class="text-muted">
            Have a question about JobFlow? Need help getting started? Drop us a message and we’ll get back to you as soon as possible.
          </p>
        </div>
      </div>
      <div class="row mt-5 align-items-center">
        <div class="col-lg-4">
          <div class="card bg-primary bg-shape border-0 mb-3">
            <div class="card-body">
              <div class="d-flex align-items-center gap-3 mb-3">
                <span
                  class="icon-bg bg-light text-primary rounded d-flex justify-content-center align-items-center border border-primary">
                  <i class="ti ti-phone-call fs-4"></i>
                </span>
                <p class="mb-0 fw-semibold f-16 text-white">Reach Us by Email</p>
              </div>
              <h5 class="text-white mt-4 mb-5">hello&#64;katharix.com</h5>
              <a href="#!" class="btn btn-light btn-sm w-100">Contact Us</a>
            </div>
          </div>

        </div>
        <div class="col-lg-8">
          <div class="custom-form p-3">
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
              <h6 class="mb-4">Send Details</h6>
              <div class="row">
                <div class="col-lg-6">
                  <div class="mb-3">
                    <input name="name" [(ngModel)]="model.name" class="form-control border" placeholder="Name" required>
                  </div>
                </div>
  
                <div class="col-lg-6">
                  <div class="mb-3">
                    <input name="email" [(ngModel)]="model.email" class="form-control border" placeholder="Email" required type="email">
                  </div>
                </div>
  
                <div class="col-lg-12">
                  <div class="mb-3">
                    <input name="subject" [(ngModel)]="model.subject" class="form-control border" placeholder="Subject" required>
                  </div>
                </div>
  
                <div class="col-lg-12">
                  <div class="mb-3">
                    <textarea name="message" [(ngModel)]="model.message" class="form-control border" rows="8" required></textarea>

                  </div>
                </div>
  
              </div>
  
              <div class="row">
                <div class="col-sm-12">
                  <re-captcha
                    [siteKey]="reCAPTCHAKey"
                    (resolved)="onCaptchaResolved($event)"
                    (expired)="onCaptchaExpired()"
                    (errored)="onCaptchaError()">
                  </re-captcha>
                  <button [disabled]="!captchaToken" type="submit" class="btn btn-primary">
                    Send Message
                  </button>
                  <div class="mt-3 text-center">
                    <div *ngIf="success" class="alert alert-success py-2 px-4 d-inline-block">
                      ✅ Message sent!
                    </div>
                  
                    <div *ngIf="error" class="alert alert-danger py-2 px-4 d-inline-block">
                      ❌ Something went wrong. Please try again.
                    </div>
                  </div>
                </div>
  
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  
  </section>
