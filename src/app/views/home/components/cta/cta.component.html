<section class="section-sm bg-dark bg-shape">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="title text-white text-center mb-4">
          <img src="assets/public/images/gmail.png" alt="" class="img-fluid mb-4">
          <h3>Subscribe</h3>
          <p class="text-white-50 mb-0">Subscribe to our newsletter & stay update</p>
        </div>

        <div class="subscribe">
          <form (ngSubmit)="onSubmit()">
            <div class="row justify-content-center align-items-center g-2">
              <div class="col-md-8">
                <div class="">
                  <input type="email" [(ngModel)]="email" name="email" class="form-control rounded-pill"
                    placeholder="Enter your E-mail address" required />
                </div>
              </div>
              </div>
              <div class="row justify-content-center align-items-center g-2">
              <div class="col-md-8">
                <div>
                  <re-captcha [siteKey]="reCAPTCHAKey" (resolved)="onCaptchaResolved($event)">
                  </re-captcha>
                  <button type="submit" class="btn btn-primary w-100" [disabled]="!captchaToken || isSubmitting">
                    {{ isSubmitting ? 'Subscribing...' : 'Subscribe' }}
                  </button>
                </div>
                <div class="mt-3 text-center">
                  <div *ngIf="success" class="alert alert-success py-2 px-4 d-inline-block">
                    ✅ Thanks for subscribing!
                  </div>
                
                  <div *ngIf="error" class="alert alert-danger py-2 px-4 d-inline-block">
                    ❌ Something went wrong. Please try again.
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
