<div class="card p-4 rounded-xl shadow bg-white">
  <h2 class="text-xl font-bold mb-4">Finish Setting Up Your Account</h2>

  <div class="space-y-3" *ngIf="steps?.length; else loading">
    <div
      *ngFor="let step of steps"
      class="flex items-center justify-between p-3 border rounded-lg"
    >
      <div>
        <span class="font-semibold">{{ step.title }}</span>
        <div *ngIf="step.isCompleted" class="text-green-600 text-sm">
          Completed ✓
        </div>
        <div *ngIf="!step.isCompleted" class="text-gray-500 text-sm">
          Not completed
        </div>
      </div>

      <button
        *ngIf="!step.isCompleted"
        (click)="goTo(step)"
        class="btn btn-primary btn-sm"
      >
        Go
      </button>
    </div>
  </div>

  <ng-template #loading>
    <div>Loading…</div>
  </ng-template>

  <div class="mt-6">
    <button
      class="btn btn-success w-full"
      [disabled]="!nextStep"
      (click)="goNext()"
    >
      Next step
    </button>
  </div>

  <div class="mt-2 text-sm text-gray-500" *ngIf="!nextStep && steps.length">
    All steps complete.
  </div>
</div>
