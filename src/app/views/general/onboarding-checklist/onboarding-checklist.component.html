<section class="onboarding-checklist">
   <h3>Getting started</h3>
   <p class="subtitle">
      Complete these steps to start scheduling jobs and getting paid.
   </p>

   <ul>
      <li *ngFor="let step of steps"
          [class.completed]="step.isCompleted"
          [class.active]="step === nextStep">

      <span class="status">
        {{ step.isCompleted ? '✔' : '○' }}
      </span>

         <span class="title">
        {{ step.title }}
            <small *ngIf="step === nextStep && !step.isCompleted">
          (recommended next step)
        </small>
      </span>

      </li>
   </ul>
</section>
