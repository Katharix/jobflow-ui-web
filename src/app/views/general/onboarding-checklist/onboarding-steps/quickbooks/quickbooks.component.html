<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 p-4">
                <div class="row align-items-center">
                    <!-- QuickBooks Logo & Button -->
                    <div class="col-md-6 text-center mb-4 mb-md-0">
                        <img src="assets/admin/images/photos/quickbooks-brand-preferred-logo-50-50-black-external.png"
                            width="160" class="img-fluid mb-3" alt="QuickBooks Logo" />
                        <button class="btn btn-success btn-lg" (click)="connectQuickBooks()">
                            Connect QuickBooks
                        </button>
                    </div>

                    <!-- Info Section -->
                    <div class="col-md-6">
                        <h4 class="mb-3">Sync Your Financial Data</h4>
                        <p class="text-muted">
                            Securely connect your QuickBooks account to sync invoices, clients, payments, and employee
                            data. Save time, reduce errors, and keep your accounting in one place.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
