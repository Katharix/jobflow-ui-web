<div class="container my-5" *ngFor="let provider of paymentProviders">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 p-4">
                <div class="row align-items-center">
                    <div class="col-md-6 text-center mb-4 mb-md-0">
                        <img src="{{ provider.logoPath }}" width="180" class="img-fluid mb-3"
                            alt="{{ provider.altLogoText }}" />
                        <button class="btn btn-primary btn-lg" (click)="createStripeConnectedAccount()">
                            Connect {{ provider.provider }}
                        </button>
                    </div>
                    <div class="col-md-6">
                        <h4 class="mb-3">Accept Payments Securely</h4>
                        <p class="text-muted">
                            {{ provider.description }}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
