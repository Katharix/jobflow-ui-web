<div class="container mt-4" *ngIf="callbackStatus">
  <div
    class="alert mb-0"
    [ngClass]="{
      'alert-info': callbackStatus === 'processing',
      'alert-success': callbackStatus === 'success',
      'alert-danger': callbackStatus === 'error'
    }"
    role="alert"
  >
    <strong *ngIf="callbackProvider">{{ callbackProvider }}:</strong>
    {{ callbackMessage }}
  </div>
</div>

<div class="container my-5" *ngFor="let provider of paymentProviders">
  <div class="row justify-content-center">
    <div class="col-md-8 position-relative">
      <!-- Payment Card -->
      <div class="card shadow-lg border-0 p-4">
        <div class="row align-items-center">
          <!-- Logo + Button -->
          <div class="col-md-6 text-center mb-4 mb-md-0">
            <img
              [src]="provider.logoPath"
              width="180"
              class="img-fluid mb-3"
              [alt]="provider.altLogoText"
            />
            <button
              class="btn btn-primary btn-lg"
              (click)="createConnectedAccount(provider.provider)"
            >
              Connect {{ provider.provider }}
            </button>
          </div>

          <!-- Description -->
          <div class="col-md-6">
            <h4 class="mb-3">Accept Payments Securely</h4>
            <p class="text-muted">
              {{ provider.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
