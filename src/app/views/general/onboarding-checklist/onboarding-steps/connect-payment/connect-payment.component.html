<div class="container my-5" *ngFor="let provider of paymentProviders">
  <div class="row justify-content-center">
    <div class="col-md-8 position-relative">
      <!-- Coming Soon Overlay -->
      <div
        *ngIf="provider.provider === 'Square'"
        class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-light bg-opacity-75 rounded"
        style="z-index: 2;"
      >
        <div class="text-center">
          <h3 class="text-primary fw-bold">Coming Soon!</h3>
        </div>
      </div>

      <!-- Payment Card -->
      <div
        class="card shadow-lg border-0 p-4"
        [class.opacity-50]="provider.provider === 'Square'"
      >
        <div class="row align-items-center">
          <!-- Logo + Button -->
          <div class="col-md-6 text-center mb-4 mb-md-0">
            <img
              [src]="provider.logoPath"
              width="180"
              class="img-fluid mb-3"
              [alt]="provider.altLogoText"
            />
            <button
              class="btn btn-primary btn-lg"
              [disabled]="provider.provider === 'Square'"
              (click)="createStripeConnectedAccount()"
            >
              Connect {{ provider.provider }}
            </button>
          </div>

          <!-- Description -->
          <div class="col-md-6">
            <h4 class="mb-3">Accept Payments Securely</h4>
            <p class="text-muted">
              {{ provider.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
