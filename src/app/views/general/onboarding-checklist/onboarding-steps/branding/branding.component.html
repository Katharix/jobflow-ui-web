<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
      <form [formGroup]="brandingForm">
        <!-- 🖼️ Logo + 🎨 Brand Colors -->
        <div class="mb-5">
          <h5 class="text-muted mb-4 d-flex align-items-center gap-2">
            <i data-feather="image" appFeatherIcon class="text-primary"></i>
            Logo & Brand Colors
          </h5>

          <div class="row g-4 align-items-end">
            <!-- Logo Upload -->
            <div class="col-md-6 col-lg-4">
              <label for="logoUpload" class="btn btn-outline-primary w-100">
                <i data-feather="upload" appFeatherIcon class="me-2"></i>
                Upload Logo
              </label>
              <input
                type="file"
                id="logoUpload"
                hidden
                (change)="onLogoSelected($event)"
                accept="image/*"
              />
              <div class="mt-3" *ngIf="logoPreview">
                <img
                  [src]="logoPreview"
                  alt="Logo Preview"
                  class="img-thumbnail border shadow-sm"
                  style="max-height: 100px;"
                />
              </div>
            </div>

            <!-- Primary Color -->
            <div class="col-md-3 col-lg-4">
              <label class="form-label">Primary Color</label>
              <color-block
                formControlName="primaryColor"
                triangle="hide"
                [color]="brandingForm.value.primaryColor"
                (onChangeComplete)="onPrimaryColorChange($event)"
              ></color-block>
            </div>

            <!-- Secondary Color -->
            <div class="col-md-3 col-lg-4">
              <label class="form-label">Secondary Color</label>
              <color-block
                formControlName="secondaryColor"
                triangle="hide"
                [color]="brandingForm.value.secondaryColor"
                (onChangeComplete)="onSecondaryColorChange($event)"
              ></color-block>
            </div>
          </div>
        </div>

        <!-- 🏷️ Business Info -->
        <div class="mb-5">
          <h5 class="text-muted mb-4 d-flex align-items-center gap-2">
            <i data-feather="type" appFeatherIcon class="text-primary"></i>
            Business Info
          </h5>

          <div class="mb-3">
            <label class="form-label">Tagline</label>
            <input
              type="text"
              class="form-control"
              formControlName="tagline"
              placeholder="e.g., Where Jobs Flow and Business Grows"
            />
          </div>
        </div>

        <!-- 📝 Footer Note -->
        <div class="mb-5">
          <h5 class="text-muted mb-4 d-flex align-items-center gap-2">
            <i data-feather="file-text" appFeatherIcon class="text-primary"></i>
            Invoice Footer Note
          </h5>

          <label class="form-label">Footer Note</label>
          <textarea
            class="form-control"
            rows="2"
            formControlName="footerNote"
            placeholder="Thanks for your business!"
          ></textarea>
        </div>
      </form>

      <!-- 📄 Live Preview -->
      <div
        class="border rounded shadow-sm p-4 mt-5"
        [ngStyle]="previewStyles"
        style="max-width: 500px;"
      >
        <!-- Logo + Business Info -->
        <div class="d-flex align-items-center mb-4">
          <img
            *ngIf="logoPreview"
            [src]="logoPreview"
            alt="Logo"
            style="max-height: 50px;"
            class="me-3"
          />
          <div>
            <h5 class="mb-1">{{ brandingForm.value.businessName || 'Your Business' }}</h5>
            <small class="text-muted">{{ brandingForm.value.tagline || 'Your tagline here' }}</small>
          </div>
        </div>

        <!-- Invoice Summary -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span class="text-muted">Invoice #</span>
            <span>#12345</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted">Date</span>
            <span>June 2, 2025</span>
          </div>
          <div class="d-flex justify-content-between fw-bold mt-3">
            <span>Total</span>
            <span>$299.00</span>
          </div>
        </div>

        <!-- Optional Footer Note -->
        <hr />
        <footer class="text-muted small">
          {{ brandingForm.value.footerNote || 'Thanks for your business!' }}
        </footer>
      </div>
    </div>
  </div>
</div>
