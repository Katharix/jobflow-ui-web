<app-page-header
  title="Roles"
  subtitle="Manage your team roles"
  [actions]="headerActions"
></app-page-header>

<div class="card shadow-sm p-3">
  <ng-template #actionsTemplate let-role>
    <div class="text-end">
      <button type="button" class="btn btn-sm btn-outline-primary me-2" (click)="editRole(role)">Edit</button>
      <button type="button" class="btn btn-sm btn-outline-danger" (click)="deleteRole(role)">Delete</button>
    </div>
  </ng-template>

  <jobflow-grid
    [data]="roles"
    [columns]="columns"
    [pageSettings]="pageSettings"
    [allowFiltering]="false"
    [showSearchBar]="false"
  ></jobflow-grid>
</div>

<jobflow-modal
  *ngIf="showRoleModal"
  [title]="editingRoleId ? 'Edit Role' : 'Add Role'"
  [confirmText]="editingRoleId ? 'Save Changes' : 'Create Role'"
  [cancelText]="'Cancel'"
  [formGroup]="roleForm"
  (cancel)="closeRoleModal()"
  (confirm)="saveRole()"
>
  <div [formGroup]="roleForm">
    <label class="form-label fw-semibold" for="roleName">Role Name</label>
    <input pInputText pSize="small" id="roleName" type="text" formControlName="name" placeholder="Enter role name" class="w-100" />
    <div
      class="text-danger small mt-2"
      *ngIf="roleForm.controls.name.touched && roleForm.controls.name.invalid"
    >
      Role name is required.
    </div>
  </div>
</jobflow-modal>
