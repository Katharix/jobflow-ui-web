<form [formGroup]="form" (ngSubmit)="onSubmit()">

   <div class="mb-3">
      <label class="form-label fw-semibold text-muted">Schedule Type</label>
      <p-select formControlName="scheduleMode" [options]="scheduleModeOptions" optionLabel="label" optionValue="value" size="small" [fluid]="true" />
   </div>

   <div class="mb-3">
      <label class="form-label fw-semibold text-muted">Start</label>
      <p-datepicker formControlName="scheduledStart" [showTime]="true" [fluid]="true" />
   </div>

   <div class="mb-3">
      <label class="form-label fw-semibold text-muted">End</label>
      <p-datepicker formControlName="scheduledEnd" [showTime]="true" [fluid]="true" />
   </div>

   <div class="mb-3">
      <label class="form-label fw-semibold text-muted">Notes</label>
      <textarea pTextarea rows="3" formControlName="notes" class="w-100"></textarea>
   </div>

   <ng-container *ngIf="isRecurring">
      <div class="mb-3">
         <label class="form-label fw-semibold text-muted">Frequency</label>
         <p-select formControlName="pattern" [options]="patternOptions" optionLabel="label" optionValue="value" size="small" [fluid]="true" />
      </div>

      <div class="mb-3">
         <label class="form-label fw-semibold text-muted">Interval</label>
         <p-inputnumber formControlName="interval" [min]="1" [fluid]="true" />
      </div>

      <div class="mb-3" *ngIf="form.get('pattern')?.value === 'Weekly'">
         <label class="form-label fw-semibold text-muted">Days of Week</label>
         <div class="d-flex gap-2">
            <label *ngFor="let day of weekDays" class="form-check form-check-inline">
               <input
                  type="checkbox"
                  class="form-check-input"
                  [value]="day.value"
                  (change)="onDayOfWeekChange(day.value, $event)"
                  [checked]="isDaySelected(day.value)">
               <span class="form-check-label">{{ day.name }}</span>
            </label>
         </div>
      </div>

      <div class="mb-3" *ngIf="form.get('pattern')?.value === 'Monthly'">
         <label class="form-label fw-semibold text-muted">Day of Month</label>
         <p-inputnumber formControlName="dayOfMonth" [min]="1" [max]="31" [fluid]="true" />
      </div>

      <div class="mb-3">
         <label class="form-label fw-semibold text-muted">Ends</label>
         <p-select formControlName="endType" [options]="endTypeOptions" optionLabel="label" optionValue="value" size="small" [fluid]="true" />
      </div>

      <div class="mb-3" *ngIf="form.get('endType')?.value === 'OnDate'">
         <label class="form-label fw-semibold text-muted">End Date</label>
         <p-datepicker formControlName="endDate" [fluid]="true" />
      </div>

      <div class="mb-3" *ngIf="form.get('endType')?.value === 'AfterCount'">
         <label class="form-label fw-semibold text-muted">Occurrences</label>
         <p-inputnumber formControlName="occurrenceCount" [min]="1" [fluid]="true" />
      </div>
   </ng-container>

   <div class="d-flex justify-content-end mt-4">
      <button
         type="submit"
         class="btn btn-primary fw-semibold">
         Save Assignment
      </button>
   </div>
</form>
