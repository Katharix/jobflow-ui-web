<app-page-header
   title="Jobs"
   subtitle="Manage your jobs"
   [actions]="headerActions"
></app-page-header>
<div *ngIf="error" class="alert alert-danger mb-3">
   {{ error }}
</div>

<jobflow-drawer
   [open]="isDrawerOpen"
   title="Add Job"
   (closed)="onDrawerClosed()"
>
   <job-create (saved)="onCreateSaved()" (cancelled)="onCreateCancelled()"/>
</jobflow-drawer>

<ng-template #jobTitleTemplate let-job>
   <div class="job-cell">
      <div class="job-title">{{ job.title }}</div>
      <div class="job-client">
         {{ job.organizationClient.firstName }}
         {{ job.organizationClient.lastName }}
      </div>
   </div>
</ng-template>

<ng-template #actionsTemplate let-data>
   <div class="grid-actions">

      <button
         *ngIf="isUnscheduled(data)"
         class="btn btn-sm btn-primary"
         (click)="scheduleJob(data)">
         Schedule
      </button>

      <button
         class="btn btn-sm btn-link"
         (click)="editJob(data)">
         Edit
      </button>

      <button
         class="btn btn-sm btn-link text-danger"
         (click)="deleteJob(data)">
         Delete
      </button>

   </div>
</ng-template>

<ng-template #statusTemplate let-job>
   <span
      class="job-status-chip"
      [ngClass]="getStatusChipClass(job)">
      {{ getStatusChipLabel(job) }}
   </span>
</ng-template>

<jobflow-grid
   [data]="items"
   [columns]="columns"
   [pageSettings]="pageSettings"
   [height]="600"
   [showSearchBar]="true"
   (commandClick)="onCommandClick($event)"
></jobflow-grid>
