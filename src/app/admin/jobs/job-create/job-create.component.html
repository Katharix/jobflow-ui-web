<div class="jf-drawer__body">

  @if (error) {
    <div class="alert alert-danger py-2 px-3 mb-0">
      {{ error }}
    </div>
  }

  @if (!isEditing && (templates$ | async)?.length) {
    <div class="jf-drawer__field">
      <label class="form-label" for="jobCreateTemplate">Start from a template</label>
      <select class="form-select form-select-sm" id="jobCreateTemplate" [(ngModel)]="selectedTemplateId" (ngModelChange)="onTemplateSelected($event)">
        <option [ngValue]="null">Choose a template to pre-fill</option>
        @for (t of (templates$ | async) ?? []; track t.id) {
          <option [ngValue]="t.id">{{ t.displayLabel }}</option>
        }
      </select>
      <small class="jf-drawer__hint">Pre-fills details so you can start faster.</small>
    </div>
  }

  <div class="jf-drawer__field">
    <label class="form-label" for="jobCreateCustomer">Customer <span class="text-danger">*</span></label>
    <select class="form-select form-select-sm" id="jobCreateCustomer" [(ngModel)]="selectedCustomerId">
      <option [ngValue]="null">Select a customer</option>
      @for (c of (customers$ | async) ?? []; track c.id) {
        <option [ngValue]="c.id">{{ c.displayName }}</option>
      }
    </select>
  </div>

  <div class="jf-drawer__field">
    <label class="form-label" for="jobCreateTitle">Job Title <span class="text-danger">*</span></label>
    <input class="form-control form-control-sm" id="jobCreateTitle" type="text" [(ngModel)]="title" placeholder="Exterior repaint, spring service, etc." />
  </div>

  <div class="jf-drawer__field">
    <label class="form-label" for="jobCreateSummary">Job Summary</label>
    <textarea
      class="form-control form-control-sm"
      rows="4"
      [(ngModel)]="comments"
      placeholder="Add key notes, access instructions, or goals for the crew."
      id="jobCreateSummary"
    ></textarea>
  </div>

  <div class="jf-drawer__field">
    <label class="form-label" for="jobCreateWorkflow">Invoicing workflow</label>
    <select class="form-select form-select-sm" id="jobCreateWorkflow" [(ngModel)]="invoicingWorkflow">
      <option [ngValue]="null">Choose a workflow</option>
      @for (opt of invoicingOptions; track opt.value) {
        <option [ngValue]="opt.value">{{ opt.label }}</option>
      }
    </select>
    <small class="jf-drawer__hint">Overrides the org default for this job only.</small>
  </div>

  @if (!isEditing) {
    <div class="jf-drawer__next-step">
      <span>Next step</span>
      <p>Schedule in Dispatch to assign a crew.</p>
    </div>
  }

</div>

<div class="jf-drawer__footer">
  <a class="jf-drawer__footer-link" routerLink="/admin/clients/create">+ Create client</a>
  <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancel()" [disabled]="saving">
    Cancel
  </button>
  <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="saving">
    {{ saving ? 'Saving…' : (isEditing ? 'Save Changes' : 'Create Job') }}
  </button>
</div>
