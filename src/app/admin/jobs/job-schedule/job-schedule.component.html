<app-page-header
  [title]="'Job Assignments'"
  [subtitle]="jobTitle ? 'Schedule and manage assignments for ' + jobTitle : 'Schedule and manage assignments'"
></app-page-header>

<div class="mt-3">
  <app-jobflow-calendar
    [(selectedDate)]="selectedDate"
    [eventSettings]="calendarEvents"
    (selectedDateChange)="onCalendarDateChange($event)"
    (eventCreate)="onCalendarEventCreate($event)"
    (eventChange)="onCalendarEventUpdate($event)"
  >
  </app-jobflow-calendar>
</div>

<app-jobflow-drawer
  [open]="showAssignmentModal"
  title="Schedule Job"
  (closed)="onAssignmentDrawerClosed()"
>
  <app-job-assignment-form
    #assignmentForm
    [jobId]="currentJobId"
    [scheduledStart]="draftEvent?.StartTime ?? selectedDate"
    [scheduledEnd]="draftEvent?.EndTime ?? addThirtyMinutes(selectedDate)"
    [scheduleSettings]="scheduleSettings"
    [selectedDayForecast]="selectedDayForecast"
    [isWeatherLoading]="isWeatherLoading"
    [addressMissing]="addressMissing"
    [locationUnavailable]="locationUnavailable"
    [weatherLocation]="weatherLocation"
    [weatherIsApproximate]="weatherIsApproximate"
    (submitted)="onAssignmentSave($event)"
  >
  </app-job-assignment-form>
</app-jobflow-drawer>
