<div class="row g-3">
   <div class="col-12 col-md-6">
      <label class="form-label">First Name <span class="text-danger">*</span></label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="firstName" />
   </div>

   <div class="col-12 col-md-6">
      <label class="form-label">Last Name</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="lastName" />
   </div>

   <div class="col-12 col-md-6">
      <label class="form-label">Email</label>
      <input pInputText pSize="small" type="email" class="w-100" [(ngModel)]="email" />
   </div>

   <div class="col-12 col-md-6">
      <label class="form-label">Phone</label>
      <input pInputText pSize="small" type="tel" class="w-100" [(ngModel)]="phone" />
   </div>

   <div class="col-12">
      <label class="form-label">Address</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="address1" />
   </div>

   <div class="col-12">
      <label class="form-label">Address Line 2</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="address2" />
   </div>

   <div class="col-12 col-md-4">
      <label class="form-label">City</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="city" />
   </div>

   <div class="col-12 col-md-4">
      <label class="form-label">State</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="state" />
   </div>

   <div class="col-12 col-md-4">
      <label class="form-label">Zip</label>
      <input pInputText pSize="small" class="w-100" [(ngModel)]="zipCode" />
   </div>

   <div class="col-12 d-flex justify-content-end gap-2 pt-2">
      <button type="button" class="btn btn-light" (click)="cancel()" [disabled]="saving">
         Cancel
      </button>

      <button type="button" class="btn btn-primary" (click)="save()" [disabled]="saving">
         {{ saving ? 'Saving…' : 'Save' }}
      </button>
   </div>
</div>
