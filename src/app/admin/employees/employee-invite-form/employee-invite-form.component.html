<!-- employee-invite-form.component.html -->
<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label fw-semibold text-muted">First Name</label>
      <input type="text" formControlName="firstName" class="form-control" />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label fw-semibold text-muted">Last Name</label>
      <input type="text" formControlName="lastName" class="form-control" />
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Email Address</label>
    <input type="email" formControlName="email" class="form-control" />
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Phone Number</label>
    <input type="tel" formControlName="phoneNumber" class="form-control" />
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Employee Role</label>
    <select formControlName="roleId" class="form-select">
      <option value="">Select a Role</option>
      <option *ngFor="let role of roles" [value]="role.id">
        {{ role.name }}
      </option>
    </select>
  </div>
</form>
