<app-page-header
   title="Employees"
   subtitle="Manage your team members and roles"
   [actions]="headerActions"
></app-page-header>

<!-- Loading or Checking Roles -->
<div *ngIf="checkingRoles" class="text-center py-5">
   <div class="spinner-border text-primary" role="status"></div>
   <p class="mt-3 text-muted">Checking for organization roles...</p>
</div>

<!-- No Roles Found -->
<div *ngIf="!checkingRoles && !rolesExist"
     class="alert alert-warning d-flex justify-content-between align-items-center mt-3 shadow-sm">
   <div>
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <strong>No employee roles found.</strong> Please create one before adding employees.
   </div>
   <button class="btn btn-outline-primary btn-sm" (click)="router.navigate(['/admin/employees/roles']);">
      Go to Employee Roles
   </button>
</div>

<!-- Employee Grid -->
<div *ngIf="rolesExist && !checkingRoles" class="card shadow-sm mt-4">
   <ejs-grid
      #employeeGrid
      [dataSource]="employees"
      [allowPaging]="true"
      [pageSettings]="{ pageSize: 10 }"
      [allowSorting]="true"
      [allowFiltering]="true"
      (commandClick)="onCommandClick($event)"
   >
      <e-columns>
         <e-column field="firstName" headerText="Name" width="200" [valueAccessor]="fullNameAccessor"></e-column>
         <e-column field="email" headerText="Email" width="250"></e-column>
         <e-column field="roleName" headerText="Role" width="200"></e-column>
         <e-column headerText="Actions" [commands]="commands" width="120"></e-column>
      </e-columns>
   </ejs-grid>
</div>

<jobflow-modal
   *ngIf="showAddEmployeeModal"
   [title]="isEditing ? 'Edit Employee' : 'Add Employee'"
   [confirmText]="'Save'"
   [cancelText]="'Cancel'"
   [formGroup]="employeeFormComponent.formGroup"
   (cancel)="onModalCancel()"
   (confirm)="employeeFormComponent.onSubmit()"
>
   <app-employee-form
      [employee]="selectedEmployee"
      (submitted)="onFormSubmit($event)"
   ></app-employee-form>
</jobflow-modal>

<jobflow-modal
   *ngIf="showInviteModal"
   [title]="'Invite Employee'"
   [confirmText]="'Send Invite'"
   [cancelText]="'Cancel'"
   (cancel)="closeInviteModal()"
   (confirm)="onInviteSubmit()"
>
   <app-employee-invite-form #inviteForm
                             (submitted)="onInviteSuccess($event)"></app-employee-invite-form>
</jobflow-modal>

<jobflow-modal
   *ngIf="showDeleteModal"
   [title]="'Delete Employee'"
   [confirmText]="'Delete'"
   [cancelText]="'Cancel'"
   (cancel)="closeDeleteModal()"
   (confirm)="confirmDelete()"
   [confirmButtonClass]="'btn btn-danger px-4'"
   [cancelButtonClass]="'btn btn-outline-secondary'"
>
   <app-delete-confirm
      [title]="'Delete Employee'"
      [message]="'Are you sure you want to delete ' + selectedEmployeeName + '?'"
   ></app-delete-confirm>
</jobflow-modal>
