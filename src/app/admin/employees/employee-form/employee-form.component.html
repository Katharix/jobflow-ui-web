<form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-2">
  <div class="mb-3 d-none">
  <input type="text" formControlName="organizationId" class="form-control" />
</div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">First Name</label>
    <input type="text" formControlName="firstName" class="form-control" />
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Last Name</label>
    <input type="text" formControlName="lastName" class="form-control" />
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Email</label>
    <input type="email" formControlName="email" class="form-control" />
  </div>

 <div class="mb-3">
    <label class="form-label fw-semibold text-muted">Phone Number</label>
    <input type="tel" formControlName="phoneNumber" class="form-control" />
  </div>
  
  <div class="mb-3">
    <label for="role" class="form-label fw-semibold">Role</label>
    <select id="role" formControlName="roleId" class="form-select" required>
      <option value="" disabled>Select a role</option>
      <option *ngFor="let role of roles" [value]="role.id">{{ role.name }}</option>
    </select>
    <div *ngIf="form.get('roleId')?.invalid && form.get('roleId')?.touched" class="text-danger small">
      Role is required.
    </div>
  </div>


  <div class="form-check">
    <input class="form-check-input" type="checkbox" formControlName="isActive" />
    <label class="form-check-label">Active</label>
  </div>

  <div class="d-flex justify-content-end mt-3">
    <button type="submit" class="btn btn-primary px-4 fw-semibold" [disabled]="form.invalid">
      Save
    </button>
  </div>
</form>
