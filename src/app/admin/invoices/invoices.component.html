<app-page-header
   title="Invoices"
   subtitle="All invoices for your organization"
></app-page-header>

<div *ngIf="error" class="alert alert-danger mb-3">
   {{ error }}
</div>

<ng-template #clientTemplate let-invoice>
   <div class="invoice-client-cell">
      <div class="invoice-client-name">{{ getClientName(invoice) }}</div>
      <div class="invoice-client-email">{{ getClientEmail(invoice) }}</div>
   </div>
</ng-template>

<ng-template #statusTemplate let-invoice>
   <span class="invoice-status-chip" [ngClass]="getStatusClass(invoice)">
      {{ getStatusLabel(invoice) }}
   </span>
</ng-template>

<ng-template #actionsTemplate let-invoice>
   <button
      type="button"
      class="btn btn-sm btn-link"
      (click)="openInvoice(invoice)">
      View
   </button>
</ng-template>

<jobflow-grid
   [data]="items"
   [columns]="columns"
   [pageSettings]="pageSettings"
   [showSearchBar]="true"
></jobflow-grid>
