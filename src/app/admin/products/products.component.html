<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-0">Materials</h2>
      <p class="text-muted small">View and manage your categorized material items</p>
    </div>
    <button class="btn btn-primary" (click)="onAddCategory()">
      <lucide-icon name="plus" class="me-1"></lucide-icon>
      New Category
    </button>
  </div>

  <div class="row">
    <div
      class="col-md-4 mb-4"
      *ngFor="let category of materialCategories"
    >
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body d-flex flex-column justify-content-between">
          <div class="d-flex align-items-center mb-2">
            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 48px; height: 48px;">
              <lucide-icon name="settings" size="20"></lucide-icon>
            </div>
            <div class="flex-grow-1">
              <h5 class="card-title mb-0">{{ category.name }}</h5>
              <small class="text-muted">{{ category?.items?.length || 0 }} items</small>
            </div>
            <div class="dropdown ms-auto">
              <button class="btn btn-icon p-1" data-bs-toggle="dropdown" aria-label="Category Actions">
                <lucide-icon name="more-vertical" size="18"></lucide-icon>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" (click)="editCategory(category)">Edit</a></li>
                <li><a class="dropdown-item text-danger" (click)="deleteCategory(category)">Delete</a></li>
              </ul>
            </div>
          </div>
          <div class="mt-2">
            <button class="btn btn-sm btn-outline-primary w-100" (click)="viewCategoryItems(category)">
              View Items
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
