<div class="modal-header">
  <h5 class="modal-title">{{ data.title }}</h5>
  <button type="button" class="btn-close" (click)="close()">
    <span class="visually-hidden">Close</span>
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="save()">
  <div class="modal-body">
    <div class="mb-3">
      <label class="form-label" for="pricebookCategoryName">Name</label>
      <input id="pricebookCategoryName" pInputText pSize="small" formControlName="name" class="w-100" />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <div class="text-danger small">
          Name is required
        </div>
      }
    </div>

    <div class="mb-0">
      <label class="form-label" for="pricebookCategoryDescription">Description</label>
      <textarea id="pricebookCategoryDescription" pTextarea rows="3" formControlName="description" class="w-100"></textarea>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="close()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Save</button>
  </div>
</form>
