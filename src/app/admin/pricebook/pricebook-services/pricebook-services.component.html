<app-page-header
  title="Services"
  subtitle="Manage your service catalogue — pricing, cost, and markup for every offering."
></app-page-header>

<div class="pb-toolbar">
  @if (items.length > 0) {
    <span class="pb-toolbar__stat">
      <strong>{{ items.length }}</strong>&nbsp;{{ items.length === 1 ? 'service' : 'services' }}
    </span>
  }
  <button type="button" class="btn btn-primary btn-sm d-inline-flex align-items-center gap-2" (click)="add()">
    <lucide-icon name="plus-circle" [size]="14"></lucide-icon>
    New Service
  </button>
</div>

<app-jobflow-grid
  [data]="items"
  [columns]="columns"
  [pageSettings]="pageSettings"
  [height]="600"
  [showSearchBar]="true"
  (commandClick)="onCommandClick($event)"
></app-jobflow-grid>
