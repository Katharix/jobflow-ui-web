<div class="container-fluid py-4">
   <app-page-header [title]="'Price Book Items'"
                    [subtitle]="'Manage materials for ' + categoryName"
                    [actions]="headerActions">
   </app-page-header>

   <app-jobflow-grid
      [data]="items"
      [columns]="columns"
      [pageSettings]="pageSettings"
      [height]="600"
      [showSearchBar]="true"
      (commandClick)="onCommandClick($event)"
   ></app-jobflow-grid>

</div>
