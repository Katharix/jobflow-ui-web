<app-page-header
  [title]="'Price Book Items'"
  [subtitle]="'Manage materials for ' + categoryName"
></app-page-header>

<section class="pb-item-overview">
  <div class="pb-item-overview__intro">
    <button type="button" class="pb-item-overview__back" (click)="goBackToCategories()">
      <lucide-icon name="chevron-left" size="16"></lucide-icon>
      Back to Categories
    </button>
    <span class="pb-item-overview__eyebrow">{{ categoryName }}</span>
    <h2>Items in this category</h2>
    <p>Add, edit, or remove materials and set cost and pricing for each.</p>
  </div>
  <div class="pb-item-overview__metrics">
    <div class="pb-item-metric">
      <span class="pb-item-metric__label">Total items</span>
      <span class="pb-item-metric__value">{{ items.length }}</span>
    </div>
  </div>
  <div class="pb-item-cta">
    <div>
      <p class="pb-item-cta__eyebrow">Quick action</p>
      <h3>Add a new item</h3>
      <p>Create a material with cost, price, and inventory details.</p>
    </div>
    <button type="button" class="btn btn-primary" (click)="add()">
      New Item
    </button>
  </div>
</section>

<app-jobflow-grid
  [data]="items"
  [columns]="columns"
  [pageSettings]="pageSettings"
  [height]="600"
  [showSearchBar]="true"
  (commandClick)="onCommandClick($event)"
></app-jobflow-grid>
