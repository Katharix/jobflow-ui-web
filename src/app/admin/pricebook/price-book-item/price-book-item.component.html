<app-page-header
  [title]="categoryName ?? ''"
  [subtitle]="'Materials in this category — manage cost, price, and markup.'"
></app-page-header>

<div class="pb-toolbar">
  <button type="button" class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1" (click)="goBackToCategories()">
    <lucide-icon name="chevron-left" [size]="14"></lucide-icon>
    Categories
  </button>
  <div class="d-flex align-items-center gap-3">
    @if (items.length > 0) {
      <span class="pb-toolbar__stat">
        <strong>{{ items.length }}</strong>&nbsp;{{ items.length === 1 ? 'item' : 'items' }}
      </span>
    }
    <button type="button" class="btn btn-primary btn-sm d-inline-flex align-items-center gap-2" (click)="add()">
      <lucide-icon name="plus-circle" [size]="14"></lucide-icon>
      New Item
    </button>
  </div>
</div>

<app-jobflow-grid
  [data]="items"
  [columns]="columns"
  [pageSettings]="pageSettings"
  [height]="600"
  [showSearchBar]="true"
  (commandClick)="onCommandClick($event)"
></app-jobflow-grid>
