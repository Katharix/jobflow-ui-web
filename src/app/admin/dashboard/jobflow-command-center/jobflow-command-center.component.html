<section class="command-center">
   <article class="hero-panel">
      <div class="hero-panel__content">
         <p class="hero-panel__eyebrow">Jobflow Command Center</p>
         <h2>Create and launch jobs with less effort.</h2>
         <p>
            We’ve prioritized the path that matters most: customer intake, job creation, scheduling, and invoicing.
            Every step is designed to be clear, fast, and actionable.
         </p>

         <div class="hero-actions">
            <a
               *ngFor="let action of primaryActions"
               class="hero-action"
               [routerLink]="action.route"
               [queryParams]="action.queryParams || null"
            >
               <i [class]="action.icon"></i>
               <div>
                  <h3>{{ action.label }}</h3>
                  <p>{{ action.description }}</p>
               </div>
            </a>
         </div>

         <app-dashboard-comprehensive-workflow [flowSteps]="flowSteps"></app-dashboard-comprehensive-workflow>
      </div>
   </article>
</section>
