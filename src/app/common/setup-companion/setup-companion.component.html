@if (visible()) {
  <div class="setup-companion" [class.setup-companion--open]="isOpen()">

    <!-- FAB Trigger -->
    <button
      class="setup-companion__fab"
      type="button"
      aria-label="Open Flow, your setup companion"
      (click)="toggle()">
      @if (isOpen()) {
        <i-lucide name="x" [size]="20" aria-hidden="true"></i-lucide>
      } @else {
        <i-lucide name="sparkles" [size]="20" aria-hidden="true"></i-lucide>
        <span class="setup-companion__fab-label">Ask Flow</span>
      }
    </button>

    <!-- Chat Panel -->
    @if (isOpen()) {
      <div class="setup-companion__panel">
        <div class="setup-companion__header">
          <div class="d-flex align-items-center gap-2">
            <i-lucide name="sparkles" [size]="16" aria-hidden="true"></i-lucide>
            <span class="fw-semibold">Flow <span class="fw-normal opacity-75">· Setup Guide</span></span>
          </div>
          <button type="button" class="btn-close btn-close-white btn-sm" aria-label="Close" (click)="close()">
            <span class="visually-hidden">Close</span>
          </button>
        </div>

        <div class="setup-companion__body" #bodyRef>
          @for (msg of messages(); track $index) {
            <div class="setup-companion__bubble"
                 [class.setup-companion__bubble--user]="msg.role === 'user'"
                 [class.setup-companion__bubble--assistant]="msg.role === 'assistant'">
              {{ msg.text }}
            </div>
          }

          @if (isLoading()) {
            <div class="setup-companion__bubble setup-companion__bubble--assistant setup-companion__bubble--loading">
              <span></span><span></span><span></span>
            </div>
          }
        </div>

        <div class="setup-companion__input-row">
          <textarea
            class="setup-companion__input"
            rows="1"
            placeholder="Ask a setup question…"
            [(ngModel)]="inputText"
            (keydown)="handleKeydown($event)"
            [disabled]="isLoading()"
            aria-label="Type your question"></textarea>
          <button
            class="setup-companion__send"
            type="button"
            (click)="send()"
            [disabled]="!inputText.trim() || isLoading()"
            aria-label="Send">
            <span class="visually-hidden">Send</span>
            <i-lucide name="send" [size]="16" aria-hidden="true"></i-lucide>
          </button>
        </div>
      </div>
    }

  </div>
}
