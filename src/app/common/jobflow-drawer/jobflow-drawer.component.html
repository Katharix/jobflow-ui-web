<p-drawer
   [visible]="open"
   [position]="'right'"
   [header]="title"
   [modal]="true"
   [dismissible]="closeOnBackdrop"
   [closeOnEscape]="true"
   [style]="drawerStyle"
   styleClass="jobflow-prime-drawer"
   [baseZIndex]="1050"
   (onShow)="opened.emit()"
   (visibleChange)="onVisibleChange($event)"
>
   <ng-content></ng-content>
</p-drawer>
