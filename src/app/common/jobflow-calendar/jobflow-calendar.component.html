<!-- 📅 Calendar Toolbar -->
<div class="calendar-toolbar row align-items-center gx-3 gy-2 mb-4">

   <div class="date-nav d-flex align-items-center gap-3 px-3 py-2">
      <button class="btn btn-icon p-0 border-0 text-primary" (click)="goPrev()">
         <lucide-icon name="chevron-left"></lucide-icon>
      </button>

      <span class="fw-semibold text-dark small">{{ selectedWeekRange }}</span>

      <button class="btn btn-icon p-0 border-0 text-primary" (click)="goNext()">
         <lucide-icon name="chevron-right"></lucide-icon>
      </button>
   </div>


   <!-- Today Button -->
   <div class="col-auto">
      <button class="btn btn-outline-primary btn-sm fw-semibold px-3" (click)="goToday()">Today</button>
   </div>

   <!-- View Toggle (Week/Day) -->
   <div class="col-auto d-flex gap-2 flex-wrap" *ngIf="mode === 'dispatch'">
      <button *ngFor="let view of views"
              class="btn btn-outline-secondary btn-sm fw-semibold"
              [ngClass]="{ 'active-view': calendarView === view }"
              (click)="setView(view)">
         {{ view }}
      </button>
   </div>


   <!-- Optional Room Filter -->
   <div *ngIf="mode === 'dispatch' && filters?.length" class="col-auto ms-auto">
      <select class="form-select form-select-sm"
              [(ngModel)]="selectedFilter"
              (change)="onFilterChange($event)">
         <option value="">All Employees</option>
         <option *ngFor="let filter of filters" [value]="filter.value">
            {{ filter.label }}
         </option>
      </select>
   </div>

</div>

<!-- 📆 Scheduler Container -->
<div class="card shadow-sm border-0 rounded-3">
   <div class="card-body p-0">
      <ejs-schedule
         [cssClass]="'jobflow-scheduler ' + mode"
         width="100%"
         [height]="height"
         [(selectedDate)]="selectedDate"
         [eventSettings]="eventSettings"
         [currentView]="calendarView"
         [views]="effectiveViews"
         [showHeaderBar]="false"
         [group]="group"
         [resources]="resources"
         [readonly]="isReadOnly"
         [allowDragAndDrop]="allowInteraction"
         [allowResizing]="allowInteraction"
         (actionBegin)="onActionBegin($event)"
         (actionComplete)="onActionComplete($event)"
         (popupOpen)="onPopupOpen($event)"
         (cellClick)="onCellClick($event)"
      >
      </ejs-schedule>

   </div>
</div>
