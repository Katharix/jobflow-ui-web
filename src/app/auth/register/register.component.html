<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-xl-5">
      <div class="p-4 rounded-3 bg-white">
        <div class="text-center mb-4">
          <a routerLink=".">
            <img src="/assets/public/images/Asset 1.png" alt="Logo" style="height: 40px;" />
          </a>
          <h5 class="text-muted fw-normal mt-3">Create your account</h5>
        </div>

        <form (ngSubmit)="onRegister($event)">
          <!-- Company Name -->
          <div class="form-group form-floating-line mb-4">
            <input type="text"
                   class="form-control no-border"
                   id="orgName"
                   name="organizationName"
                   placeholder="Company Name"
                   [(ngModel)]="organizationName"
                   disabled />
          
          </div>

          <!-- Email / Username -->
          <div class="form-group form-floating-line mb-4">
            <input type="text"
                   class="form-control no-border"
                   id="email"
                   name="email"
                   placeholder="Email"
                   [(ngModel)]="email"
                    />
         
          </div>

          <!-- Password -->
          <div class="form-group form-floating-line mb-4">
            <input type="password"
                   class="form-control no-border"
                   id="password"
                   name="password"
                   placeholder="Password"
                   [(ngModel)]="password"
                   required
                   minlength="8"
                   [pattern]="pattern"
                   #passwordModel="ngModel" />
         
            <div *ngIf="passwordModel.invalid && passwordModel.touched" class="text-danger mt-1">
              <div *ngIf="passwordModel.errors?.['required']">Password is required.</div>
              <div *ngIf="passwordModel.errors?.['minlength']">Minimum 8 characters required.</div>
              <div *ngIf="passwordModel.errors?.['pattern']">
                Must include uppercase, lowercase, number, and special character.
              </div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group form-floating-line mb-4">
            <input type="password"
                   class="form-control no-border"
                   id="confirmPassword"
                   name="confirmPassword"
                   placeholder="Confirm Password"
                   [(ngModel)]="confirmPassword"
                   required />

          </div>

          <!-- Remember Me -->
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="authCheck" />
            <label class="form-check-label" for="authCheck">Remember me</label>
          </div>

          <!-- Submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
